<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Krew3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#0a4a6e;font-family:'Segoe UI',sans-serif;user-select:none}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:300;display:flex;justify-content:center;align-items:center;flex-direction:column;color:#fff}
#overlay h2{color:#f1c40f;font-size:32px;margin-bottom:8px}#overlay .sub{opacity:.5;font-size:14px;margin-bottom:20px}
#overlay input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:12px 16px;border-radius:8px;font-size:16px;outline:none;width:220px;text-align:center;margin-bottom:12px}
#overlay button{padding:12px 32px;background:#f1c40f;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}
#overlay button:disabled{background:#555;color:#999}#conn-msg{color:#f1c40f;font-size:14px;margin-bottom:12px}
.h{position:fixed;z-index:10}
#ctrl{top:10px;left:10px;background:rgba(0,0,0,.6);color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;border:1px solid rgba(255,255,255,.1);line-height:1.8;display:none}
#ctrl kbd{background:rgba(255,255,255,.12);padding:2px 5px;border-radius:3px;font-size:11px}
#gold{top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#f1c40f;font-size:18px;font-weight:bold;padding:6px 20px;border-radius:8px;display:none;border:1px solid rgba(241,196,15,.3)}
#hp-w{bottom:28px;left:50%;transform:translateX(-50%);width:300px;height:24px;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.2);border-radius:12px;overflow:hidden;display:none}
#hp-b{height:100%;width:100%;background:linear-gradient(90deg,#e74c3c,#f1c40f 50%,#2ecc71);transition:width .2s;border-radius:12px}
#hp-t{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-weight:bold;font-size:13px;text-shadow:1px 1px 2px #000}
#sail{bottom:58px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;display:none;background:rgba(0,0,0,.4);padding:4px 12px;border-radius:6px}
#prompt{bottom:90px;left:50%;transform:translateX(-50%);color:#f1c40f;font-size:16px;font-weight:bold;display:none;background:rgba(0,0,0,.6);padding:8px 18px;border-radius:8px}
#sb{top:10px;right:10px;background:rgba(0,0,0,.5);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;display:none;border:1px solid rgba(255,255,255,.1);max-height:220px}
#sb h3{margin-bottom:4px;color:#f1c40f;font-size:14px}.sr{display:flex;justify-content:space-between;gap:12px;padding:2px 0;font-size:12px}.sr.me{color:#2ecc71;font-weight:bold}
#lbl{top:80px;left:10px;color:rgba(255,255,255,.5);font-size:12px;display:none;background:rgba(0,0,0,.3);padding:3px 8px;border-radius:4px}
#pc{bottom:4px;left:10px;color:rgba(255,255,255,.3);font-size:10px;display:none}
#mm{bottom:14px;right:14px;width:200px;height:200px;background:rgba(10,30,60,.8);border:2px solid rgba(255,255,255,.15);border-radius:8px;display:none;cursor:crosshair}
#inv{bottom:14px;left:14px;background:rgba(0,0,0,.5);color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;display:none;border:1px solid rgba(255,255,255,.08)}
#inv h4{color:#f1c40f;font-size:12px;margin-bottom:4px}
#cargo{bottom:70px;left:14px;background:rgba(0,0,0,.5);color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;display:none;border:1px solid rgba(255,255,255,.08)}
#cargo h4{color:#3498db;font-size:12px;margin-bottom:4px}
#safez{top:40px;left:50%;transform:translateX(-50%);background:rgba(46,204,113,.25);color:#2ecc71;font-size:16px;font-weight:bold;padding:6px 20px;border-radius:8px;display:none;border:1px solid rgba(46,204,113,.4)}
#cross{position:fixed;pointer-events:none;z-index:5;display:none;width:20px;height:20px}
#cross::before,#cross::after{content:'';position:absolute;background:rgba(255,255,255,.5)}
#cross::before{width:18px;height:2px;top:9px;left:1px}#cross::after{width:2px;height:18px;top:1px;left:9px}
#death{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:100;flex-direction:column;color:#fff}
#death h1{font-size:42px;color:#e74c3c}
#conn-s{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#f1c40f;padding:14px 24px;border-radius:10px;z-index:200;display:none;font-size:16px}
#panel{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:none;justify-content:center;align-items:center}
#panel-box{background:rgba(20,20,30,.96);border:2px solid rgba(241,196,15,.4);border-radius:12px;padding:20px 24px;color:#fff;min-width:520px;max-width:640px;max-height:80vh;overflow-y:auto;font-size:13px}
#panel-box h2{color:#f1c40f;font-size:20px;margin-bottom:4px}#pgold{color:#f1c40f;margin-bottom:10px;font-size:14px}
.sc{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:10px 14px;margin-bottom:6px}
.si h3{font-size:14px;margin-bottom:2px}.si p{font-size:11px;opacity:.5}
.btn{padding:5px 14px;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;margin-left:4px}
.btn-y{background:#f1c40f;color:#000}.btn-b{background:#3498db;color:#fff}.btn-g{background:#2ecc71;color:#000}.btn-r{background:#e74c3c;color:#fff}.btn-d{background:#444;color:#888}
#pclose{display:block;margin:10px auto 0;padding:6px 20px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:6px;cursor:pointer;font-size:13px}
#pmsg{color:#2ecc71;font-size:12px;text-align:center;margin-top:4px;min-height:16px}
.tsec{margin-top:8px;border-top:1px solid rgba(255,255,255,.1);padding-top:8px}.tsec h3{font-size:14px;margin-bottom:6px;color:#3498db}
.trow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.tabs{display:flex;gap:3px;margin-bottom:10px}.tab{padding:5px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:5px 5px 0 0;cursor:pointer;font-size:12px;color:#aaa}
.tab.active{background:rgba(241,196,15,.15);color:#f1c40f;border-color:rgba(241,196,15,.3)}
</style></head><body>
<div id="overlay"><h2>KREW 3D</h2><div class="sub">Pirate MMO</div><div id="conn-msg">Connecting...</div>
<input id="nin" placeholder="Pirate name..." maxlength="16"><button id="nbtn" disabled>Connecting...</button></div>
<div id="conn-s" class="h"></div><div id="cross"></div>
<div id="ctrl" class="h"><strong style="color:#f1c40f">Controls</strong><br><kbd>WASD</kbd> Move · <kbd>Click</kbd> Fire<br><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> Sails · <kbd>E</kbd> Board/Leave<br><kbd>Space</kbd> Jump · <kbd>B</kbd> Menu<br><kbd>F</kbd> Mine · <kbd>G</kbd> Deposit<br><kbd>Right-Click</kbd> Free Look</div>
<div id="gold" class="h"></div><div id="safez" class="h">Safe Zone</div>
<div id="hp-w" class="h"><div id="hp-b"></div><div id="hp-t"></div></div>
<div id="sail" class="h"></div><div id="prompt" class="h"></div>
<div id="sb" class="h"><h3>Players</h3><div id="slist"></div></div>
<div id="lbl" class="h"></div><div id="pc" class="h"></div>
<canvas id="mm" class="h" width="200" height="200"></canvas>
<div id="inv" class="h"><h4>Inventory</h4><div id="inv-list"></div></div>
<div id="cargo" class="h"><h4>Cargo</h4><div id="cargo-list"></div></div>
<div id="death"><h1>SUNK!</h1><p id="dmsg"></p></div>
<div id="panel"><div id="panel-box"><h2 id="ptitle">Menu</h2><div id="pgold"></div>
<div class="tabs"><div class="tab active" data-tab="ships">Ships</div><div class="tab" data-tab="trade">Trade</div><div class="tab" data-tab="housing">Housing</div><div class="tab" data-tab="market">Market</div></div>
<div id="tab-content"></div><div id="pmsg"></div><button id="pclose">Close [B]</button></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══ Simplex-like noise for terrain ═══
const _p=new Uint8Array(512);for(let i=0;i<256;i++)_p[i]=i;
for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[_p[i],_p[j]]=[_p[j],_p[i]]}
for(let i=0;i<256;i++)_p[i+256]=_p[i];
function fade(t){return t*t*t*(t*(t*6-15)+10)}
function grad(h,x,y){const v=h&3;return(v===0?x+y:v===1?-x+y:v===2?x-y:-x-y)}
function noise2d(x,y){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);
  const u=fade(x),v=fade(y);
  const a=_p[X]+Y,b=_p[X+1]+Y;
  return 0.5+0.5*(function(t){return t})(
    fade(1-v)*(fade(1-u)*grad(_p[a],x,y)+fade(u)*grad(_p[b],x-1,y))+
    fade(v)*(fade(1-u)*grad(_p[a+1],x,y-1)+fade(u)*grad(_p[b+1],x-1,y-1)));
}
function fbm(x,y,oct){let v=0,a=1,f=1,m=0;for(let i=0;i<oct;i++){v+=a*noise2d(x*f,y*f);m+=a;a*=0.5;f*=2}return v/m}

// ═══ ADAPTIVE INTERPOLATION ═══
let stBuf=[],INTERP=100,lastStateT=0,jitter=0;
function pushState(s){
  const now=Date.now();if(lastStateT){const dt=now-lastStateT;jitter=jitter*0.9+Math.abs(dt-50)*0.1;INTERP=Math.max(80,Math.min(250,jitter*3+80))}
  lastStateT=now;stBuf.push(s);if(stBuf.length>40)stBuf.splice(0,stBuf.length-40);
}
function lerp(a,b,t){return a+(b-a)*t}
function lerpA(a,b,t){let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return a+d*t}
function getIS(){
  const rt=Date.now()-INTERP;while(stBuf.length>2&&stBuf[1].t<=rt)stBuf.shift();
  if(stBuf.length<2)return stBuf[stBuf.length-1]||null;
  const s0=stBuf[0],s1=stBuf[1],dt=s1.t-s0.t;if(dt<=0)return s1;
  const t=Math.min(1.2,Math.max(0,(rt-s0.t)/dt)); // allow slight extrapolation
  const out={t:rt,p:{},cb:s1.cb,gi:s1.gi,hs:s1.hs};
  for(const id of new Set([...Object.keys(s0.p),...Object.keys(s1.p)])){
    const a=s0.p[id],b=s1.p[id];if(!a){out.p[id]=b;continue}if(!b){out.p[id]=a;continue}
    out.p[id]={bx:lerp(a.bx,b.bx,t),bz:lerp(a.bz,b.bz,t),br:lerpA(a.br,b.br,t),bs:lerp(a.bs,b.bs,t),
      cx:lerp(a.cx,b.cx,t),cz:lerp(a.cz,b.cz,t),cy:lerp(a.cy,b.cy,t),cr:lerpA(a.cr,b.cr,t),
      sl:b.sl,ob:b.ob,sw:b.sw,hp:b.hp,mhp:b.mhp,sc:b.sc,g:b.g,n:b.n,sh:b.sh,
      cargo:b.cargo,cu:b.cu,inv:b.inv,mn:b.mn,bo:b.bo,sk:b.sk}}
  return out;
}

let ws,scene,camera,renderer,clock;
let myId=null,MAP=6000,ISL=[],MISL=[],SAFE=null,ALL=[],ROCKS=[],SD={},GD={},OD={},HD={};
let water,aimRing,dots=[];let ents={},cbPool=[];
let keys={},mX=0,mY=0,mW={x:0,z:0};
let playing=false,panelOpen=false,pTab='ships',freeLook=false,flY=0,flP=0;
let myGold=5000,myOwned=['rowboat'],myShip='rowboat',nearIdx=-1;
let mktList=[],hSlots=[],hStore={};
const ray=new THREE.Raycaster(),mv2=new THREE.Vector2(),wP=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const mmC=document.getElementById('mm'),mmX=mmC.getContext('2d');
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}

// ═══ WEBSOCKET ═══
(function(){function connect(){const pr=location.protocol==='https:'?'wss':'ws';ws=new WebSocket(`${pr}://${location.host}/ws`);
  ws.onopen=()=>{document.getElementById('conn-msg').textContent='Connected!';document.getElementById('nbtn').disabled=false;document.getElementById('nbtn').textContent='SET SAIL!';document.getElementById('conn-s').style.display='none'};
  ws.onclose=()=>{if(!playing){document.getElementById('conn-msg').textContent='Reconnecting...';document.getElementById('nbtn').disabled=true}else{document.getElementById('conn-s').textContent='Reconnecting...';document.getElementById('conn-s').style.display='block'}setTimeout(connect,1500)};
  ws.onerror=()=>{};
  ws.onmessage=e=>{const msg=JSON.parse(e.data);switch(msg.t){
    case 'init':myId=msg.id;MAP=msg.map;SD=msg.ships||{};GD=msg.goods||{};OD=msg.ores||{};HD=msg.houseDefs||{};
      if(msg.state)stBuf=[msg.state];ISL=msg.islands||[];MISL=msg.mineIslands||[];SAFE=msg.safeIsland;ALL=[SAFE,...ISL,...MISL];ROCKS=msg.rocks||[];hSlots=msg.houseSlots||[];
      if(scene){for(const i of ALL)buildIsland(i);buildRocks();buildHouseMeshes()}
      if(msg.spawnX!==undefined&&camera){const r=msg.spawnR||0;camera.position.set(msg.spawnX-Math.sin(r)*50,30,msg.spawnZ-Math.cos(r)*50);camera.lookAt(msg.spawnX,3,msg.spawnZ)}
      if(playing)send({t:'setName',v:document.getElementById('nin').value.trim()||'Pirate'});break;
    case 's':pushState(msg.d);break;
    case 'left':rmEnt(msg.id);break;
    case 'sunk':document.getElementById('dmsg').textContent=`Sunk by ${msg.by}!`;document.getElementById('death').style.display='flex';setTimeout(()=>document.getElementById('death').style.display='none',2500);break;
    case 'msg':document.getElementById('pmsg').textContent=msg.v;break;
    case 'upd':if(msg.gold!==undefined)myGold=msg.gold;if(msg.owned)myOwned=msg.owned;if(msg.ship)myShip=msg.ship;break;
    case 'mkt':mktList=msg.list||[];if(panelOpen&&pTab==='market')renderTab();break;
    case 'hs':hStore={slot:msg.slot,storage:msg.storage,used:msg.used,cap:msg.cap};if(panelOpen&&pTab==='housing')renderTab();break;
  }};};connect()})();

document.getElementById('nbtn').onclick=go;document.getElementById('nin').onkeydown=e=>{if(e.key==='Enter'&&!document.getElementById('nbtn').disabled)go()};
function go(){document.getElementById('overlay').style.display='none';
  ['ctrl','gold','hp-w','sail','sb','mm','pc','lbl','cross','inv','cargo'].forEach(x=>document.getElementById(x).style.display='block');
  playing=true;initThree();send({t:'setName',v:document.getElementById('nin').value.trim()||'Pirate'});animate()}

function initThree(){
  scene=new THREE.Scene();scene.fog=new THREE.Fog(0x4a8aaf,300,1500);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,2000);camera.position.set(0,50,0);
  renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));renderer.setClearColor(0x6aafcf);
  document.body.appendChild(renderer.domElement);clock=new THREE.Clock();
  scene.add(new THREE.AmbientLight(0xffffff,.5));const sun=new THREE.DirectionalLight(0xfff0d0,1);sun.position.set(500,600,300);scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x87ceeb,0x3a7a5a,.25));
  water=new THREE.Mesh(new THREE.PlaneGeometry(12000,12000,50,50),new THREE.MeshPhongMaterial({color:0x0a4a6e,transparent:true,opacity:.9,shininess:40,specular:0x0d3355}));
  water.rotation.x=-Math.PI/2;scene.add(water);
  aimRing=new THREE.Mesh(new THREE.RingGeometry(2,3,16),new THREE.MeshBasicMaterial({color:0xff3333,transparent:true,opacity:.4,side:2}));aimRing.rotation.x=-Math.PI/2;aimRing.position.y=.5;aimRing.visible=false;scene.add(aimRing);
  for(let i=0;i<3;i++){const d=new THREE.Mesh(new THREE.RingGeometry(1.5,2.5,12),new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:.4,side:2}));d.rotation.x=-Math.PI/2;d.position.y=.3;d.visible=false;scene.add(d);dots.push(d)}
  if(ALL.length){for(const i of ALL)buildIsland(i);buildRocks();buildHouseMeshes()}
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
  window.addEventListener('keydown',e=>{if(!playing)return;if(panelOpen&&e.code==='KeyB'){togglePanel();return}if(panelOpen)return;keys[e.code]=true;
    if(e.code==='Digit1')send({t:'setSails',v:0});if(e.code==='Digit2')send({t:'setSails',v:1});if(e.code==='Digit3')send({t:'setSails',v:2});
    if(e.code==='KeyB')togglePanel();if(e.code==='KeyF')send({t:'mine'});if(e.code==='KeyG')send({t:'deposit'});if(e.code==='Space')e.preventDefault()});
  window.addEventListener('keyup',e=>{keys[e.code]=false});window.addEventListener('blur',()=>{keys={};freeLook=false});
  window.addEventListener('mousemove',e=>{mX=e.clientX;mY=e.clientY;if(freeLook){flY-=e.movementX*.003;flP=Math.max(-.5,Math.min(.8,flP-e.movementY*.003))}});
  window.addEventListener('mousedown',e=>{if(e.button===0&&!panelOpen&&playing)send({t:'fire'});if(e.button===2){freeLook=true;renderer.domElement.requestPointerLock?.()}});
  window.addEventListener('mouseup',e=>{if(e.button===2){freeLook=false;document.exitPointerLock?.();flY=0;flP=0}});
  renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
  mmC.addEventListener('click',e=>{const r=mmC.getBoundingClientRect();send({t:'tp',x:((e.clientX-r.left)/200-.5)*MAP,z:((e.clientY-r.top)/200-.5)*MAP})});
  document.getElementById('pclose').onclick=()=>togglePanel();
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{pTab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');renderTab()});
}

// ═══ PANEL ═══
function togglePanel(){const GS=getIS();const me=GS?.p[myId];if(!me)return;if(!panelOpen&&me.ob)return;panelOpen=!panelOpen;document.getElementById('panel').style.display=panelOpen?'flex':'none';if(panelOpen){send({t:'getMkt'});renderTab()}}
function renderTab(){
  const GS=getIS();const me=GS?.p[myId];if(me)myGold=me.g;document.getElementById('pgold').textContent=`Gold: ${myGold}`;
  const el=document.getElementById('tab-content');el.innerHTML='';
  if(pTab==='ships'){for(const[t,d]of Object.entries(SD)){const own=myOwned.includes(t),eq=myShip===t,can=myGold>=d.price;
    let bc,bt;if(eq){bc='btn-d';bt='Equipped'}else if(own){bc='btn-b';bt='Equip'}else if(can){bc='btn-y';bt=`${d.price}g`}else{bc='btn-d';bt=`${d.price}g`}
    const c=document.createElement('div');c.className='sc';c.innerHTML=`<div class="si"><h3>${d.name}</h3><p>HP:${d.hp} Spd:${Math.round(d.speed*100)} ${d.cannons==='side'?d.count+' side':'Front'} Crew:${d.crew} Cargo:${d.cargo}</p></div><button class="btn ${bc}">${bt}</button>`;
    el.appendChild(c);c.querySelector('button').onclick=()=>{if(eq)return;if(own)send({t:'equip',v:t});else send({t:'buy',v:t});setTimeout(renderTab,300)}}}
  else if(pTab==='trade'){if(nearIdx!==-99){let isl=nearIdx===-1?SAFE:ISL[nearIdx];
    if(isl&&isl.goods){let h=`<div class="tsec"><h3>Trade at ${isl.name}</h3>`;
      for(const[g,info]of Object.entries(isl.goods)){const gd=GD[g]||{};const have=me?.cargo?.[g]||0;
        h+=`<div class="trow"><span>${gd.icon||''} ${gd.name||g} (${info.stock} stk, ${info.price}g)</span><span>
          <button class="btn btn-g" onclick="send({t:'buyGood',good:'${g}',qty:5,idx:${nearIdx}});setTimeout(renderTab,300)">Buy5</button>
          <button class="btn btn-r" onclick="send({t:'sellGood',good:'${g}',qty:5,idx:${nearIdx}});setTimeout(renderTab,300)">Sell5</button> Own:${have}</span></div>`}
      const inv=me?.inv||{};if(Object.keys(inv).length){h+=`<div style="margin-top:6px"><b>Sell Ores:</b>`;for(const[o,q]of Object.entries(inv)){if(q<=0)continue;h+=`<div class="trow"><span>${OD[o]?.icon||''} ${o} x${q}</span><button class="btn btn-r" onclick="send({t:'sellOre',ore:'${o}',qty:999});setTimeout(renderTab,300)">Sell</button></div>`}h+=`</div>`}
      h+=`</div>`;el.innerHTML=h}else el.innerHTML='<p style="opacity:.4">Go to an island to trade</p>'}
    else el.innerHTML='<p style="opacity:.4">Not near a trade island</p>'}
  else if(pTab==='housing'){let h=`<div class="tsec"><h3>Haven Island Housing</h3>`;
    for(let i=0;i<hSlots.length;i++){const hs=hSlots[i];
      if(hs.owner===myId){h+=`<div class="sc"><div class="si"><h3>Your ${hs.type||'house'}</h3><p>Slot ${i+1}</p></div><span>
        <button class="btn btn-b" onclick="send({t:'getHS',slot:${i}});setTimeout(renderTab,300)">View Storage</button>

  else if(pTab==='market'){let h=`<div class="tsec"><h3>Public Market</h3>`;

}

function mkTrade(){const g=new THREE.Group();g.add(M(new THREE.BoxGeometry(6,2.5,14),0x6B4E12,[0,1.5,0]));for(const s of[-1,1])g.add(M(new THREE.BoxGeometry(.3,2,14.5),0x543210,[s*3.15,2.8,0]));g.add(M(new THREE.ConeGeometry(3.2,4,4),0x6B4E12,[0,1.5,9],[Math.PI/2,0,0]));g.add(M(new THREE.BoxGeometry(5.5,.2,13),0xC4A060,[0,3,0]));g.add(M(new THREE.BoxGeometry(4,2.5,4),0x7a5020,[0,4.5,-4.5]));g.add(M(new THREE.CylinderGeometry(.18,.22,12,6),0x543210,[0,9.5,1]));const s=M(new THREE.PlaneGeometry(7,9),0xe8dfc8,[0,11,2]);s.material.side=2;s.material.transparent=true;s.material.opacity=.85;s.name='sail';g.add(s);g.add(M(new THREE.CylinderGeometry(.3,.35,.4,6),0x333333,[0,3.3,5.5]));const b=M(new THREE.CylinderGeometry(.15,.2,2.2,6),0x1a1a1a,[0,3.5,6.8],[Math.PI/2,0,0]);b.name='barrel';g.add(b);return g}

// ═══ ISLAND WITH PERLIN TERRAIN ═══
function buildIsland(d){
  const g=new THREE.Group();const mine=!!d.ore;const safe=!!d.safe;
  const col=mine?0x8a7a5a:safe?0x3aaa5a:0x4a8a3a;
  // Terrain with perlin noise displacement
  const segs=Math.min(32,Math.max(12,Math.floor(d.r/10)));
  const geo=new THREE.CylinderGeometry(d.r*0.95,d.r,safe?6:mine?2:4,segs,4);
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    if(y>0){const n=fbm((d.x+x)*0.01,(d.z+z)*0.01,3);pos.setY(i,y+n*(safe?15:mine?3:8))}
  }
  geo.computeVertexNormals();
  g.add(Object.assign(new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color:col,flatShading:true})),{position:new THREE.Vector3(0,safe?3:mine?1:2,0)}));
  // Beach
  g.add(M(new THREE.CylinderGeometry(d.r,d.r+(mine?5:15),mine?1:2.5,segs),0xf0d9a0,[0,.5,0]));
  // Vegetation
  if(!mine){const nt=Math.min(20,Math.floor(d.r/15));for(let i=0;i<nt;i++){const a=Math.random()*Math.PI*2,dd=8+Math.random()*(d.r-20);
    const p=mkPalm();p.position.set(Math.cos(a)*dd,safe?5:3,Math.sin(a)*dd);p.scale.setScalar(.5+Math.random()*.4);g.add(p)}
    for(let i=0;i<Math.min(5,Math.floor(d.r/40));i++){const r=d.r*(.1+Math.random()*.15),a=Math.random()*Math.PI*2,dd=Math.random()*d.r*.3;
      const h=M(new THREE.SphereGeometry(r,8,6),0x3d7a30,[Math.cos(a)*dd,r*.4+(safe?5:3),Math.sin(a)*dd]);h.scale.y=.4;g.add(h)}}
  else{for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+Math.random()*.5;g.add(M(new THREE.DodecahedronGeometry(2+Math.random()*2,0),d.ore==='gold'?0xd4a017:d.ore==='iron'?0x777:0xcd7f32,[Math.cos(a)*d.r*.3,3,Math.sin(a)*d.r*.3]))}}
  if(safe){const ring=new THREE.Mesh(new THREE.RingGeometry(d.r+10,d.r+18,40),new THREE.MeshBasicMaterial({color:0x2ecc71,transparent:true,opacity:.12,side:2}));ring.rotation.x=-Math.PI/2;ring.position.y=.2;g.add(ring)}
  g.position.set(d.x,0,d.z);scene.add(g);
}
function mkPalm(){const g=new THREE.Group();const h=5+Math.random()*3;g.add(M(new THREE.CylinderGeometry(.2,.4,h,5),0x8B6914,[0,h/2,0],[0,0,(Math.random()-.5)*.2]));for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2;g.add(M(new THREE.ConeGeometry(2,3,3),0x228B22,[Math.cos(a)*1,h,Math.sin(a)*1],[Math.sin(a)*.6,0,Math.cos(a)*.6]))}return g}
function buildRocks(){for(const o of ROCKS){const m=M(new THREE.SphereGeometry(o.r,5,4),0x666655,[o.x,3+o.r*.4,o.z]);m.scale.y=.5;scene.add(m)}}

let giM={};function updateGI(items){const act=new Set();for(const gi of(items||[])){act.add(gi.id);if(!giM[gi.id]){const col=gi.type==='gold'?0xffd700:gi.type==='iron'?0xaaa:0xcd7f32;const m=new THREE.Mesh(new THREE.OctahedronGeometry(.8,0),new THREE.MeshPhongMaterial({color:col}));m.position.set(gi.x,3.8,gi.z);scene.add(m);giM[gi.id]=m}giM[gi.id].rotation.y=Date.now()*.002;giM[gi.id].position.y=3.8+Math.sin(Date.now()*.003)*.3}for(const id in giM)if(!act.has(+id)){scene.remove(giM[id]);delete giM[id]}}

function rmEnt(id){const e=ents[id];if(!e)return;if(e.boat)scene.remove(e.boat);scene.remove(e.char);if(e.tag.parent)e.tag.parent.remove(e.tag);delete ents[id]}

// ═══ MAIN LOOP ═══
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();const GS=getIS();if(!GS)return;
  if(ws?.readyState===1&&myId&&!panelOpen)send({t:'input',fwd:!!(keys['KeyW']||keys['ArrowUp']),back:!!(keys['KeyS']||keys['ArrowDown']),left:!!(keys['KeyA']||keys['ArrowLeft']),right:!!(keys['KeyD']||keys['ArrowRight']),act:!!keys['KeyE'],jump:!!keys['Space']});
  if(!freeLook){mv2.x=(mX/innerWidth)*2-1;mv2.y=-(mY/innerHeight)*2+1;ray.setFromCamera(mv2,camera);const h=new THREE.Vector3();if(ray.ray.intersectPlane(wP,h)){mW.x=h.x;mW.z=h.z;send({t:'aim',x:h.x,z:h.z})}}
  // Gentle water
  const wp=water.geometry.attributes.position;for(let i=0;i<wp.count;i++){const x=wp.getX(i),y=wp.getY(i);wp.setZ(i,Math.sin(x*.008+t*.8)*.4+Math.sin(y*.01+t*.6)*.3)}wp.needsUpdate=true;water.geometry.computeVertexNormals();

  const act=new Set();
  for(const id in GS.p){act.add(id);const p=GS.p[id],e=getEnt(id),me=id===myId;ensBoat(e,p.sh);
    const sk=p.sk||0;
    e.boat.position.set(p.bx,Math.sin(t*1.5+p.bx*.03)*.15+.3+(sk>0?-sk*8:0),p.bz);
    e.boat.rotation.y=p.br;
    // VERY subtle tilt - almost none
    e.boat.rotation.z=(sk>0?sk*.4:0);e.boat.rotation.x=Math.sin(t*1.2)*.008;
    const hpR=Math.max(0,p.hp)/(p.mhp||100);
    const sl=e.boat.getObjectByName('sail');if(sl){sl.scale.y+=(([.05,.5,1][p.sl||1])*Math.max(.1,hpR)-sl.scale.y)*.12}
    const s2=e.boat.getObjectByName('sail2');if(s2){s2.scale.y+=(([.05,.4,.9][p.sl||1])*Math.max(.1,hpR)-s2.scale.y)*.12}
    if(me&&p.ob){const br=e.boat.getObjectByName('barrel');if(br){const d=Math.hypot(mW.x-p.bx,mW.z-p.bz);br.rotation.x=Math.PI/2-Math.min(.5,d*.002)}}
    if(p.sh==='tradeship')updateBarrels(e.boat,p.cu);
    if(p.ob&&!p.bo){e.char.position.set(p.bx+(SD[p.sh]?.cannons==='front'?Math.sin(p.br)*2:-Math.sin(p.br)*5),e.boat.position.y+2,p.bz+(SD[p.sh]?.cannons==='front'?Math.cos(p.br)*2:-Math.cos(p.br)*5));e.char.rotation.y=me?Math.atan2(mW.x-e.char.position.x,mW.z-e.char.position.z):p.br}
    else if(p.bo){e.char.position.set(p.cx,2.5+e.boat.position.y,p.cz);e.char.rotation.y=p.cr}
    else{e.char.position.set(p.cx,p.cy,p.cz);e.char.rotation.y=p.cr;
      if(p.mn){e.char.rotation.x=Math.sin(t*6)*.3}else{e.char.rotation.x=0;const sw=Math.sin(t*8)*.35;['lL','lR','aL','aR'].forEach(n=>{const m=e.char.getObjectByName(n);if(m)m.rotation.x=n.includes('L')?sw:-sw})}}
    if(e.tn!==p.n){if(e.tag.parent)e.tag.parent.remove(e.tag);e.tag=mkTag(p.n,me);e.tag.position.y=p.ob?(p.sh==='warship'?22:10):6;e.tn=p.n}
    const att=p.ob||p.bo?'b':'c';if(e.to!==att){if(e.tag.parent)e.tag.parent.remove(e.tag);(p.ob?e.boat:e.char).add(e.tag);e.tag.position.y=p.ob?(p.sh==='warship'?22:10):6;e.to=att}}
  for(const id in ents)if(!act.has(id))rmEnt(id);
  // Update house meshes
  if(GS.hs){let changed=false;for(let i=0;i<GS.hs.length&&i<hSlots.length;i++){if(hSlots[i].owner!==GS.hs[i].owner||hSlots[i].type!==(GS.hs[i].type||'')){hSlots[i].owner=GS.hs[i].owner;hSlots[i].type=GS.hs[i].type||'';changed=true}}if(changed)buildHouseMeshes()}
  const me=GS.p[myId];
  if(me?.ob){aimRing.visible=true;aimRing.position.x=mW.x;aimRing.position.z=mW.z;
    if(SD[me.sh]?.cannons==='side'){for(let i=0;i<3;i++){dots[i].visible=true;const sp=(i-1)*8;dots[i].position.x=mW.x+Math.sin(me.br)*sp;dots[i].position.z=mW.z+Math.cos(me.br)*sp}}else dots.forEach(d=>d.visible=false)}
  else{aimRing.visible=false;dots.forEach(d=>d.visible=false)}
  const cba=GS.cb||[];for(let i=0;i<cba.length;i++){const m=getCB(i);m.visible=true;m.position.set(cba[i].x,cba[i].y,cba[i].z)}for(let i=cba.length;i<cbPool.length;i++)cbPool[i].visible=false;
  updateGI(GS.gi);
  if(me&&ents[myId]){const e=ents[myId];let tgt,rot,cd,ch;
    if(me.ob){tgt=e.boat.position;rot=e.boat.rotation.y;cd=50;ch=28}else{tgt=e.char.position;rot=e.char.rotation.y;cd=24;ch=16}
    let cR=rot,cP=0;if(freeLook){cR=rot+flY;cP=flP}
    camera.position.x+=(tgt.x-Math.sin(cR)*cd-camera.position.x)*.07;camera.position.z+=(tgt.z-Math.cos(cR)*cd-camera.position.z)*.07;
    camera.position.y+=(tgt.y+ch+cP*25-camera.position.y)*.07;camera.lookAt(tgt.x,tgt.y+4+cP*12,tgt.z)}
  updateHUD(GS);drawMM(GS);
  document.getElementById('cross').style.left=(mX-10)+'px';document.getElementById('cross').style.top=(mY-10)+'px';
  renderer.render(scene,camera);
}
function updateHUD(GS){const me=GS?.p[myId];if(!me)return;myGold=me.g;myShip=me.sh;
  document.getElementById('gold').textContent=`${myGold} Gold`;

    else{ap.style.display='none';if(SAFE&&Math.hypot(me.cx-SAFE.x,me.cz-SAFE.z)<SAFE.r)nearIdx=-1;
      for(let i=0;i<ISL.length;i++)if(Math.hypot(me.cx-ISL[i].x,me.cz-ISL[i].z)<ISL[i].r){nearIdx=i;break}}}
  else ap.style.display='none';

  document.getElementById('slist').innerHTML=sorted.map(([id,p])=>`<div class="sr${id===myId?' me':''}"><span>${p.n}</span><span>${p.sc} kills · ${p.g}g</span></div>`).join('');

  const cap=SD[me.sh]?.cargo||0;if(cap>0){document.getElementById('cargo').style.display='block';

  else document.getElementById('cargo').style.display='none';
}
function drawMM(GS){const c=mmX,w=200,h=200,s=w/MAP;c.clearRect(0,0,w,h);c.fillStyle='rgba(8,35,60,.85)';c.fillRect(0,0,w,h);
  if(SAFE){c.fillStyle='rgba(46,204,113,.25)';c.beginPath();c.arc(w/2+SAFE.x*s,h/2+SAFE.z*s,Math.max(8,SAFE.r*s),0,Math.PI*2);c.fill()}
  c.fillStyle='#4a8a3a';for(const i of ISL){c.beginPath();c.arc(w/2+i.x*s,h/2+i.z*s,Math.max(4,i.r*s),0,Math.PI*2);c.fill()}
  c.fillStyle='#8a7a5a';for(const i of MISL){c.beginPath();c.arc(w/2+i.x*s,h/2+i.z*s,Math.max(2,i.r*s),0,Math.PI*2);c.fill()}
  c.fillStyle='rgba(255,255,255,.2)';c.font='7px sans-serif';c.textAlign='center';
  for(const i of ALL)c.fillText(i.name||'',w/2+i.x*s,h/2+i.z*s+i.r*s+8);
  for(const id in GS.p){const p=GS.p[id],me=id===myId;c.fillStyle=me?'#2ecc71':'#e74c3c';c.beginPath();c.arc(w/2+p.bx*s,h/2+p.bz*s,me?4:2.5,0,Math.PI*2);c.fill()}}
