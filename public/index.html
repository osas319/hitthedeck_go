<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Krew3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#6aafcf;font-family:'Segoe UI',sans-serif;user-select:none}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:300;display:flex;justify-content:center;align-items:center;flex-direction:column;color:#fff}
#overlay h2{color:#f1c40f;font-size:32px;margin-bottom:8px}#overlay .sub{opacity:.5;font-size:14px;margin-bottom:20px}
#overlay input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:12px 16px;border-radius:8px;font-size:16px;outline:none;width:220px;text-align:center;margin-bottom:12px}
#overlay button{padding:12px 32px;background:#f1c40f;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}

.h{position:fixed;z-index:10}

#ctrl kbd{background:rgba(255,255,255,.12);padding:2px 5px;border-radius:3px;font-size:11px}
#gold{top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#f1c40f;font-size:18px;font-weight:bold;padding:6px 20px;border-radius:8px;display:none;border:1px solid rgba(241,196,15,.3)}
#hp-w{bottom:28px;left:50%;transform:translateX(-50%);width:300px;height:24px;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.2);border-radius:12px;overflow:hidden;display:none}
#hp-b{height:100%;width:100%;background:linear-gradient(90deg,#e74c3c,#f1c40f 50%,#2ecc71);transition:width .2s;border-radius:12px}
#hp-t{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-weight:bold;font-size:13px;text-shadow:1px 1px 2px #000}

#prompt{bottom:90px;left:50%;transform:translateX(-50%);color:#f1c40f;font-size:16px;font-weight:bold;display:none;background:rgba(0,0,0,.6);padding:8px 18px;border-radius:8px}
#sb{top:10px;right:10px;background:rgba(0,0,0,.5);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;display:none;border:1px solid rgba(255,255,255,.1);max-height:220px}
#sb h3{margin-bottom:4px;color:#f1c40f;font-size:14px}.sr{display:flex;justify-content:space-between;gap:12px;padding:2px 0;font-size:12px}.sr.me{color:#2ecc71;font-weight:bold}
#lbl{top:80px;left:10px;color:rgba(255,255,255,.5);font-size:12px;display:none;background:rgba(0,0,0,.3);padding:3px 8px;border-radius:4px}
#pc{bottom:4px;left:10px;color:rgba(255,255,255,.3);font-size:10px;display:none}
#mm{bottom:14px;right:14px;width:200px;height:200px;background:rgba(10,30,60,.8);border:2px solid rgba(255,255,255,.15);border-radius:8px;display:none;cursor:crosshair}
#inv{bottom:14px;left:14px;background:rgba(0,0,0,.5);color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;display:none;border:1px solid rgba(255,255,255,.08)}
#inv h4{color:#f1c40f;font-size:12px;margin-bottom:4px}

#cargo h4{color:#3498db;font-size:12px;margin-bottom:4px}
#safez{top:40px;left:50%;transform:translateX(-50%);background:rgba(46,204,113,.25);color:#2ecc71;font-size:16px;font-weight:bold;padding:6px 20px;border-radius:8px;display:none;border:1px solid rgba(46,204,113,.4)}
#cross{position:fixed;pointer-events:none;z-index:5;display:none;width:20px;height:20px}
#cross::before,#cross::after{content:'';position:absolute;background:rgba(255,255,255,.5)}
#cross::before{width:18px;height:2px;top:9px;left:1px}#cross::after{width:2px;height:18px;top:1px;left:9px}
#death{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;justify-content:center;align-items:center;z-index:100;flex-direction:column;color:#fff}
#death h1{font-size:42px;color:#e74c3c}
#conn-s{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#f1c40f;padding:14px 24px;border-radius:10px;z-index:200;display:none;font-size:16px}
#countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:90;pointer-events:none;display:none}
#countdown span{font-size:120px;font-weight:900;color:#f1c40f;text-shadow:0 0 40px rgba(241,196,15,.6),0 0 80px rgba(241,196,15,.3),0 4px 8px rgba(0,0,0,.5);animation:cdPop .8s ease-out forwards}
@keyframes cdPop{0%{opacity:0;transform:scale(2.5)}15%{opacity:1;transform:scale(1)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.6)}}
.mbtn{width:44px;height:44px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.25);border-radius:10px;color:#fff;font-size:16px;font-weight:bold;cursor:pointer}
#panel{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:none;justify-content:center;align-items:center}
#panel-box{background:rgba(20,20,30,.96);border:2px solid rgba(241,196,15,.4);border-radius:12px;padding:20px 24px;color:#fff;min-width:520px;max-width:640px;max-height:80vh;overflow-y:auto;font-size:13px}
#panel-box h2{color:#f1c40f;font-size:20px;margin-bottom:4px}#pgold{color:#f1c40f;margin-bottom:10px;font-size:14px}
.sc{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:10px 14px;margin-bottom:6px}
.si h3{font-size:14px;margin-bottom:2px}.si p{font-size:11px;opacity:.5}
.btn{padding:5px 14px;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;margin-left:4px}
.btn-y{background:#f1c40f;color:#000}.btn-b{background:#3498db;color:#fff}.btn-g{background:#2ecc71;color:#000}.btn-r{background:#e74c3c;color:#fff}.btn-d{background:#444;color:#888}
#pclose{display:block;margin:10px auto 0;padding:6px 20px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:6px;cursor:pointer;font-size:13px}
#pmsg{color:#2ecc71;font-size:12px;text-align:center;margin-top:4px;min-height:16px}
.tsec{margin-top:8px;border-top:1px solid rgba(255,255,255,.1);padding-top:8px}.tsec h3{font-size:14px;margin-bottom:6px;color:#3498db}
.trow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.tabs{display:flex;gap:3px;margin-bottom:10px}.tab{padding:5px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:5px 5px 0 0;cursor:pointer;font-size:12px;color:#aaa}
.tab.active{background:rgba(241,196,15,.15);color:#f1c40f;border-color:rgba(241,196,15,.3)}
/* Mobile */
#mob{display:none;position:fixed;z-index:20;inset:0;pointer-events:none}
#mob>*{pointer-events:auto}
#joyzone{position:absolute;bottom:30px;left:20px;width:140px;height:140px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:50%}
#joystick{width:50px;height:50px;background:rgba(255,255,255,.3);border-radius:50%;position:absolute;left:45px;top:45px;transition:none}
.mbtn{position:absolute;width:56px;height:56px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.2);border-radius:50%;color:#fff;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mbtn:active{background:rgba(241,196,15,.4)}
#mb-fire{bottom:90px;right:20px;width:70px;height:70px;font-size:14px;background:rgba(231,76,60,.5);border-color:rgba(231,76,60,.6)}
#mb-e{bottom:170px;right:20px}#mb-b{bottom:170px;right:84px}
#mb-s1{bottom:30px;right:160px;font-size:10px}#mb-s2{bottom:30px;right:100px;font-size:10px}#mb-s3{bottom:30px;right:40px;font-size:10px;display:none}
#mb-zoom-in{bottom:240px;right:20px;width:44px;height:44px;font-size:18px}#mb-zoom-out{bottom:240px;right:70px;width:44px;height:44px;font-size:18px}
@media(max-width:800px),(pointer:coarse){#mob{display:block}#ctrl{display:none!important}#mm{width:120px!important;height:120px!important}}
</style></head><body>
<div id="overlay"><h2>KREW 3D</h2><div class="sub">Pirate MMO</div><div id="conn-msg">Connecting...</div>
<input id="nin" placeholder="Pirate name..." maxlength="16"><button id="nbtn" disabled>Connecting...</button></div>

<div id="lbl" class="h"></div><div id="pc" class="h"></div>
<canvas id="mm" class="h" width="200" height="200"></canvas>
<canvas id="fullmap" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;border:2px solid rgba(255,255,255,.3);border-radius:12px;background:rgba(8,35,60,.95)" width="600" height="600"></canvas>
<div id="inv" class="h"><h4>Inventory</h4><div id="inv-list"></div></div>
<div id="cargo" class="h"><h4>Cargo</h4><div id="cargo-list"></div></div>

  <div id="joyzone"><div id="joystick"></div></div>
  <div id="mb-fire" class="mbtn">FIRE</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ═══ ADAPTIVE INTERPOLATION ═══
let stBuf=[],INTERP=100,lastStateT=0,jitter=0;
function pushState(s){
  const now=Date.now();if(lastStateT){const dt=now-lastStateT;jitter=jitter*0.9+Math.abs(dt-50)*0.1;INTERP=Math.max(80,Math.min(250,jitter*3+80))}
  lastStateT=now;stBuf.push(s);if(stBuf.length>40)stBuf.splice(0,stBuf.length-40);
}
function lerp(a,b,t){return a+(b-a)*t}
function lerpA(a,b,t){let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return a+d*t}
function getIS(){
  const rt=Date.now()-INTERP;while(stBuf.length>2&&stBuf[1].t<=rt)stBuf.shift();
  if(stBuf.length<2)return stBuf[stBuf.length-1]||null;
  const s0=stBuf[0],s1=stBuf[1],dt=s1.t-s0.t;if(dt<=0)return s1;
  const t=Math.min(1.2,Math.max(0,(rt-s0.t)/dt)); // allow slight extrapolation
  const out={t:rt,p:{},cb:s1.cb,gi:s1.gi,hs:s1.hs};
  for(const id of new Set([...Object.keys(s0.p),...Object.keys(s1.p)])){
    const a=s0.p[id],b=s1.p[id];if(!a){out.p[id]=b;continue}if(!b){out.p[id]=a;continue}
    out.p[id]={bx:lerp(a.bx,b.bx,t),bz:lerp(a.bz,b.bz,t),br:lerpA(a.br,b.br,t),bs:lerp(a.bs,b.bs,t),
      cx:lerp(a.cx,b.cx,t),cz:lerp(a.cz,b.cz,t),cy:lerp(a.cy,b.cy,t),cr:lerpA(a.cr,b.cr,t),
      sl:b.sl,ob:b.ob,sw:b.sw,hp:b.hp,mhp:b.mhp,sc:b.sc,g:b.g,n:b.n,sh:b.sh,
      cargo:b.cargo,cu:b.cu,inv:b.inv,mn:b.mn,bo:b.bo,sk:b.sk}}
  return out;
}

let ws,scene,camera,renderer,clock;
let myId=null,MAP=6000,ISL=[],MISL=[],SAFE=null,HIDDEN=null,ALL=[],ROCKS=[],SD={},GD={},OD={},HD={};
let RECIPES={},ILLEGALS={};
let water,aimRing,dots=[];let ents={},cbPool=[];
let keys={},mX=0,mY=0,mW={x:0,z:0};
let playing=false,panelOpen=false,pTab='ships',freeLook=false;
let myGold=5000,myOwned=['rowboat'],myShip='rowboat',nearIdx=-1;
let mktList=[],hSlots=[],hStore={};
let camYaw=0,camPitch=0.3,camZoom=1.0; // independent camera orbit
let critters=[]; // {mesh,x,z,island,vx,vz,alive,respawnT}
// Sound
let sndCtx,sndWaves,sndBoom,sndLoaded=false;
function initSound(){try{sndCtx=new(window.AudioContext||window.webkitAudioContext)();
  fetch('/waves.mp3').then(r=>r.arrayBuffer()).then(b=>sndCtx.decodeAudioData(b,buf=>{sndWaves=buf;loopWaves()}));
  fetch('/boom.mp3').then(r=>r.arrayBuffer()).then(b=>sndCtx.decodeAudioData(b,buf=>{sndBoom=buf}));
  sndLoaded=true}catch(e){console.log('No audio')}}
function loopWaves(){if(!sndWaves||!sndCtx)return;const s=sndCtx.createBufferSource();s.buffer=sndWaves;s.loop=true;
  const g=sndCtx.createGain();g.gain.value=0.15;s.connect(g);g.connect(sndCtx.destination);s.start()}
function playBoom(){if(!sndBoom||!sndCtx)return;const s=sndCtx.createBufferSource();s.buffer=sndBoom;
  const g=sndCtx.createGain();g.gain.value=0.3;s.connect(g);g.connect(sndCtx.destination);s.start()}
const ray=new THREE.Raycaster(),mv2=new THREE.Vector2(),wP=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const mmC=document.getElementById('mm'),mmX=mmC.getContext('2d');
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o))}

// ═══ WEBSOCKET ═══
(function(){function connect(){const pr=location.protocol==='https:'?'wss':'ws';ws=new WebSocket(`${pr}://${location.host}/ws`);
  ws.onopen=()=>{document.getElementById('conn-msg').textContent='Connected!';document.getElementById('nbtn').disabled=false;document.getElementById('nbtn').textContent='SET SAIL!';document.getElementById('conn-s').style.display='none'};
  ws.onclose=()=>{if(!playing){document.getElementById('conn-msg').textContent='Reconnecting...';document.getElementById('nbtn').disabled=true}else{document.getElementById('conn-s').textContent='Reconnecting...';document.getElementById('conn-s').style.display='block'}setTimeout(connect,1500)};
  ws.onerror=()=>{};
  ws.onmessage=e=>{const msg=JSON.parse(e.data);switch(msg.t){
    case 'init':myId=msg.id;MAP=msg.map;SD=msg.ships||{};GD=msg.goods||{};OD=msg.ores||{};HD=msg.houseDefs||{};
      RECIPES=msg.recipes||{};ILLEGALS=msg.illegals||{};HIDDEN=msg.hiddenPort||null;
      if(msg.state)stBuf=[msg.state];ISL=msg.islands||[];MISL=msg.mineIslands||[];SAFE=msg.safeIsland;
      ALL=[SAFE,...ISL];if(HIDDEN)ALL.push(HIDDEN);ALL.push(...MISL);ROCKS=msg.rocks||[];hSlots=msg.houseSlots||[];
      if(scene){try{for(const i of ALL)buildIsland(i);buildRocks();buildHouseMeshes();console.log('World built:',ALL.length,'islands')}catch(e){console.error('World build error:',e)}}
      if(msg.spawnX!==undefined){window._sp={x:msg.spawnX,z:msg.spawnZ,r:msg.spawnR||0};if(camera){camera.position.set(msg.spawnX-Math.sin(msg.spawnR||0)*60,80,msg.spawnZ-Math.cos(msg.spawnR||0)*60);camera.lookAt(msg.spawnX,5,msg.spawnZ)}}
      if(playing)send({t:'setName',v:document.getElementById('nin').value.trim()||'Pirate'});break;
    case 's':pushState(msg.d);break;
    case 'left':rmEnt(msg.id);break;
    case 'sunk':document.getElementById('dmsg').textContent=`Sunk by ${msg.by}!`;document.getElementById('death').style.display='flex';setTimeout(()=>document.getElementById('death').style.display='none',2500);break;
    case 'msg':document.getElementById('pmsg').textContent=msg.v;break;
    case 'cd':{const cdEl=document.getElementById('countdown'),cdSpan=cdEl.querySelector('span');cdSpan.textContent=msg.v;cdEl.style.display='block';cdSpan.style.animation='none';cdSpan.offsetHeight;cdSpan.style.animation='cdPop .8s ease-out forwards';setTimeout(()=>cdEl.style.display='none',900)};break;
    case 'upd':if(msg.gold!==undefined)myGold=msg.gold;if(msg.owned)myOwned=msg.owned;if(msg.ship)myShip=msg.ship;break;
    case 'mkt':mktList=msg.list||[];if(panelOpen&&pTab==='market')renderTab();break;
    case 'hs':hStore={slot:msg.slot,storage:msg.storage,used:msg.used,cap:msg.cap};if(panelOpen&&pTab==='housing')renderTab();break;
  }};};connect()})();

document.getElementById('nbtn').onclick=go;document.getElementById('nin').onkeydown=e=>{if(e.key==='Enter'&&!document.getElementById('nbtn').disabled)go()};
function go(){document.getElementById('overlay').style.display='none';
  ['ctrl','gold','hp-w','sail','sb','mm','pc','lbl','cross','inv','cargo'].forEach(x=>document.getElementById(x).style.display='block');
  playing=true;console.log('Starting game...');initThree();initSound();initMobile();console.log('Three.js ready');send({t:'setName',v:document.getElementById('nin').value.trim()||'Pirate'});animate();console.log('Animate started')}

function initThree(){
  scene=new THREE.Scene();scene.fog=new THREE.Fog(0x7ab8cf,100,1200);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,4000);
  if(window._sp){const s=window._sp;camera.position.set(s.x-Math.sin(s.r)*60,80,s.z-Math.cos(s.r)*60);camera.lookAt(s.x,5,s.z)}
  else{camera.position.set(700,80,700);camera.lookAt(0,0,0)}
  renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));renderer.setClearColor(0x7ab8cf);
  document.body.appendChild(renderer.domElement);clock=new THREE.Clock();
  scene.add(new THREE.AmbientLight(0xffffff,.7));const sun=new THREE.DirectionalLight(0xfff0d0,1.2);sun.position.set(400,800,300);scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x87ceeb,0x4a9a6a,.4));
  const fill=new THREE.DirectionalLight(0xaaccff,.3);fill.position.set(-300,400,-200);scene.add(fill);
  const waterTex=new THREE.TextureLoader().load('/water.jpg');waterTex.wrapS=waterTex.wrapT=THREE.RepeatWrapping;waterTex.repeat.set(80,80);
  water=new THREE.Mesh(new THREE.PlaneGeometry(12000,12000,50,50),new THREE.MeshPhongMaterial({map:waterTex,transparent:true,opacity:.92,shininess:60,specular:0x2288aa}));
  water.rotation.x=-Math.PI/2;scene.add(water);
  loadGLB(); // load 3D ship model
  aimRing=new THREE.Mesh(new THREE.RingGeometry(2,3,16),new THREE.MeshBasicMaterial({color:0xff3333,transparent:true,opacity:.4,side:2}));aimRing.rotation.x=-Math.PI/2;aimRing.position.y=.5;aimRing.visible=false;scene.add(aimRing);
  for(let i=0;i<3;i++){const d=new THREE.Mesh(new THREE.RingGeometry(1.5,2.5,12),new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:.4,side:2}));d.rotation.x=-Math.PI/2;d.position.y=.3;d.visible=false;scene.add(d);dots.push(d)}
  if(ALL.length){try{for(const i of ALL)buildIsland(i);buildRocks();buildHouseMeshes();console.log('Islands built in initThree')}catch(e){console.error('initThree island error:',e)}}
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
  window.addEventListener('keydown',e=>{if(!playing)return;if(panelOpen&&e.code==='KeyB'){togglePanel();return}if(panelOpen)return;keys[e.code]=true;

function M(g,c,p,r){const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:c}));if(p)m.position.set(p[0],p[1],p[2]);if(r)m.rotation.set(r[0],r[1],r[2]);return m}
function mkRowboat(){const g=new THREE.Group();g.add(M(new THREE.BoxGeometry(3.5,1.2,8),0x8B6914,[0,.7,0]));for(const s of[-1,1])g.add(M(new THREE.BoxGeometry(.25,1,8),0x6B4E12,[s*1.6,1.4,0]));g.add(M(new THREE.ConeGeometry(1.7,2.5,4),0x8B6914,[0,.8,5],[Math.PI/2,0,0]));g.add(M(new THREE.BoxGeometry(3.2,1.5,.3),0x6B4E12,[0,1.2,-4.2]));g.add(M(new THREE.CylinderGeometry(.1,.13,6,6),0x543210,[0,4.2,-1]));const sl=M(new THREE.PlaneGeometry(2.8,3.8),0xf0e8d0,[0,5.5,-.8]);sl.material.side=2;sl.material.transparent=true;sl.material.opacity=.85;sl.name='sail';g.add(sl);g.add(M(new THREE.CylinderGeometry(.35,.4,.4,6),0x333333,[0,1.5,3]));const b=M(new THREE.CylinderGeometry(.15,.2,2,6),0x1a1a1a,[0,1.7,4.2],[Math.PI/2,0,0]);b.name='barrel';g.add(b);return g}

function mkTrade(){const g=new THREE.Group();g.add(M(new THREE.BoxGeometry(6,2.5,14),0x6B4E12,[0,1.5,0]));for(const s of[-1,1])g.add(M(new THREE.BoxGeometry(.3,2,14.5),0x543210,[s*3.15,2.8,0]));g.add(M(new THREE.ConeGeometry(3.2,4,4),0x6B4E12,[0,1.5,9],[Math.PI/2,0,0]));g.add(M(new THREE.BoxGeometry(5.5,.2,13),0xC4A060,[0,3,0]));g.add(M(new THREE.BoxGeometry(4,2.5,4),0x7a5020,[0,4.5,-4.5]));g.add(M(new THREE.CylinderGeometry(.18,.22,12,6),0x543210,[0,9.5,1]));const s=M(new THREE.PlaneGeometry(7,9),0xe8dfc8,[0,11,2]);s.material.side=2;s.material.transparent=true;s.material.opacity=.85;s.name='sail';g.add(s);g.add(M(new THREE.CylinderGeometry(.3,.35,.4,6),0x333333,[0,3.3,5.5]));const b=M(new THREE.CylinderGeometry(.15,.2,2.2,6),0x1a1a1a,[0,3.5,6.8],[Math.PI/2,0,0]);b.name='barrel';g.add(b);return g}

// ═══ ISLAND WITH PERLIN TERRAIN ═══
function buildIsland(d){
  const g=new THREE.Group();const mine=!!d.ore;const safe=!!d.safe;
  const col=mine?0x8a7a5a:safe?0x3aaa5a:0x4a8a3a;
  const segs=Math.min(24,Math.max(8,Math.floor(d.r/15)));
  // Simple flat terrain
  g.add(M(new THREE.CylinderGeometry(d.r*0.95,d.r,safe?5:mine?2:3.5,segs),col,[0,safe?2.5:mine?1:1.8,0]));
  // Beach ring
  g.add(M(new THREE.CylinderGeometry(d.r,d.r+(mine?4:12),mine?1:2,segs),0xf0d9a0,[0,.5,0]));
  // Simple hills (few sphere bumps)
  if(!mine){
    const nh=Math.min(4,Math.floor(d.r/60));
    for(let i=0;i<nh;i++){const hr=d.r*(0.1+Math.random()*0.15),a=Math.random()*Math.PI*2,dd=Math.random()*d.r*0.4;
      const h=M(new THREE.SphereGeometry(hr,6,4),0x3d7a30,[Math.cos(a)*dd,hr*0.3+(safe?4:3),Math.sin(a)*dd]);h.scale.y=0.35;g.add(h)}
    // Trees - limit count
    const nt=Math.min(12,Math.floor(d.r/25));
    for(let i=0;i<nt;i++){const a=Math.random()*Math.PI*2,dd=6+Math.random()*(d.r-15);
      const p=mkPalm();p.position.set(Math.cos(a)*dd,safe?4:2.5,Math.sin(a)*dd);p.scale.setScalar(0.5+Math.random()*0.3);g.add(p)}
  } else {
    for(let i=0;i<3;i++){const a=(i/3)*Math.PI*2+Math.random();
      g.add(M(new THREE.DodecahedronGeometry(2+Math.random()*2,0),d.ore==='gold'?0xd4a017:d.ore==='iron'?0x777777:0xcd7f32,[Math.cos(a)*d.r*0.3,3,Math.sin(a)*d.r*0.3]))}
  }
  if(safe){const ring=new THREE.Mesh(new THREE.RingGeometry(d.r+8,d.r+14,32),new THREE.MeshBasicMaterial({color:0x2ecc71,transparent:true,opacity:0.15,side:2}));ring.rotation.x=-Math.PI/2;ring.position.y=0.2;g.add(ring)}
  g.position.set(d.x,0,d.z);scene.add(g);
}
function mkPalm(){
  if(window.glbPalm1||window.glbPalm2){const src=Math.random()>.5&&window.glbPalm2?window.glbPalm2:window.glbPalm1;if(src)return src.clone()}
  const g=new THREE.Group();const h=5+Math.random()*3;g.add(M(new THREE.CylinderGeometry(.2,.4,h,5),0x8B6914,[0,h/2,0],[0,0,(Math.random()-.5)*.2]));for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2;g.add(M(new THREE.ConeGeometry(2,3,3),0x228B22,[Math.cos(a)*1,h,Math.sin(a)*1],[Math.sin(a)*.6,0,Math.cos(a)*.6]))}return g}
function buildRocks(){for(const o of ROCKS){
  let m;
  if(window.glbRocks&&window.glbRocks.length){m=window.glbRocks[Math.floor(Math.random()*window.glbRocks.length)].clone();
    const s=o.r*0.5;m.scale.set(s,s,s);m.position.set(o.x,2.5,o.z);m.rotation.y=Math.random()*Math.PI*2}
  else{m=M(new THREE.SphereGeometry(o.r,5,4),0x666655,[o.x,3+o.r*.4,o.z]);m.scale.y=.5}
  scene.add(m)}}

let houseMeshes=[];
function buildHouseMeshes(){
  houseMeshes.forEach(m=>scene.remove(m));houseMeshes=[];
  for(const hs of hSlots){let g;

      for(const s of[-1,1]){mesh.add(M(new THREE.BoxGeometry(.15,.05,.4),col,[s*.4,.3,.2]));mesh.add(M(new THREE.BoxGeometry(.15,.05,.4),col,[s*.4,.3,-.2]))}
      mesh.position.set(x,3.2,z);scene.add(mesh);
      critters.push({mesh,x,z,island:isl,vx:(Math.random()-.5)*.02,vz:(Math.random()-.5)*.02,alive:true,respawnT:0,col});
    }
  }
  console.log('Critters spawned:',critters.length);
}
function updateCritters(t){
  if(!critterInited&&ALL.length)spawnCritters();
  const GS=getIS();const me=GS?.p[myId];
  for(const cr of critters){
    if(!cr.alive){
      if(Date.now()-cr.respawnT>CRITTER_RESPAWN){
        // Respawn
        const a=Math.random()*Math.PI*2,d=10+Math.random()*(cr.island.r-20);
        cr.x=cr.island.x+Math.cos(a)*d;cr.z=cr.island.z+Math.sin(a)*d;
        cr.vx=(Math.random()-.5)*.02;cr.vz=(Math.random()-.5)*.02;
        cr.alive=true;cr.mesh.visible=true;
      }
      continue;
    }
    // Wander
    cr.x+=cr.vx;cr.z+=cr.vz;
    // Stay on island
    if(Math.hypot(cr.x-cr.island.x,cr.z-cr.island.z)>cr.island.r-5){
      cr.vx=(cr.island.x-cr.x)*.01;cr.vz=(cr.island.z-cr.z)*.01;
    }
    // Random direction change
    if(Math.random()<.02){cr.vx=(Math.random()-.5)*.03;cr.vz=(Math.random()-.5)*.03}
    cr.mesh.position.set(cr.x,3.2+Math.sin(t*4+cr.x)*.1,cr.z);
    cr.mesh.rotation.y=Math.atan2(cr.vx,cr.vz);
    // Check player touch
    if(me&&!me.ob&&!me.sw){
      if(Math.hypot(me.cx-cr.x,me.cz-cr.z)<3){
        cr.alive=false;cr.mesh.visible=false;cr.respawnT=Date.now();
        send({t:'critterGold'}); // server gives gold
      }
    }
  }
}

// ═══ MOBILE CONTROLS ═══
const isMob='ontouchstart' in window||navigator.maxTouchPoints>0;
function initMobile(){
  if(!isMob)return;
  document.getElementById('mob').style.display='block';
  document.getElementById('ctrl').style.display='none';
  
  // Joystick
  const jpad=document.getElementById('joyzone'),jknob=document.getElementById('joystick');
  let jActive=false,jCx=0,jCy=0;
  jpad.addEventListener('touchstart',e=>{e.preventDefault();jActive=true;const r=jpad.getBoundingClientRect();jCx=r.left+70;jCy=r.top+70},{passive:false});
  jpad.addEventListener('touchmove',e=>{e.preventDefault();if(!jActive)return;const t=e.touches[0];
    let dx=t.clientX-jCx,dy=t.clientY-jCy;const d=Math.hypot(dx,dy);if(d>55){dx=dx/d*55;dy=dy/d*55}
    jknob.style.left=(45+dx)+'px';jknob.style.top=(45+dy)+'px';
    keys.KeyW=dy<-12;keys.KeyS=dy>12;keys.KeyA=dx<-12;keys.KeyD=dx>12},{passive:false});
  jpad.addEventListener('touchend',()=>{jActive=false;jknob.style.left='45px';jknob.style.top='45px';keys.KeyW=keys.KeyS=keys.KeyA=keys.KeyD=false});

  // Buttons
  const btn=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('touchstart',e=>{e.preventDefault();fn()},{passive:false})};
  btn('mb-fire',()=>{const GS=getIS();const me=GS?.p[myId];if(me&&me.ob){const sh=SD[me.sh];const r=sh?.reload||1200;if(Date.now()-window._lft>=r){window._lft=Date.now();send({t:'fire'});playBoom()}}});
  // E button - hold for embark/disembark timer
  const eBtn=document.getElementById('mb-e');
  if(eBtn){eBtn.addEventListener('touchstart',e=>{e.preventDefault();keys.KeyE=true},{passive:false});
    eBtn.addEventListener('touchend',()=>{keys.KeyE=false})}
  btn('mb-b',()=>togglePanel());
  btn('mb-s1',()=>send({t:'setSails',v:0}));
  btn('mb-s2',()=>send({t:'setSails',v:1}));
  btn('mb-s3',()=>send({t:'setSails',v:2}));
  btn('mb-zoom-in',()=>{camZoom=Math.max(0.5,camZoom-0.2)});
  btn('mb-zoom-out',()=>{camZoom=Math.min(2.0,camZoom+0.2)});

  // Show all sail buttons
  document.getElementById('mb-s3').style.display='flex';

  // Camera drag (swipe on canvas area)
  let camTouch=null;
  renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===1){camTouch={x:e.touches[0].clientX,y:e.touches[0].clientY}}},{passive:true});
  renderer.domElement.addEventListener('touchmove',e=>{if(camTouch&&e.touches.length===1){
    const dx=e.touches[0].clientX-camTouch.x,dy=e.touches[0].clientY-camTouch.y;
    camYaw-=dx*0.005;camPitch=Math.max(0.05,Math.min(0.8,camPitch+dy*0.005));
    camTouch={x:e.touches[0].clientX,y:e.touches[0].clientY}}},{passive:true});
  renderer.domElement.addEventListener('touchend',()=>{camTouch=null});

  // Auto-aim at center of screen for mobile
  setInterval(()=>{if(playing&&!panelOpen){
    mv2.x=0;mv2.y=0;ray.setFromCamera(mv2,camera);const h=new THREE.Vector3();
    if(ray.ray.intersectPlane(wP,h)){mW.x=h.x;mW.z=h.z;send({t:'aim',x:h.x,z:h.z})}}},200);
}
